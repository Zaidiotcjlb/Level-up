<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LEVEL UP Walk-A-Thon Countdown</title>
  <meta name="description" content="Live countdown to the LEVEL UP Walk-A-Thon on September 26, 2026." />
  <style>
    :root {
      --deep: #09043f;
      --deep2: #19075d;
      --purple: #7b2fd0;
      --violet: #b74cff;
      --pink: #dd77ff;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; margin: 0; overflow: hidden; }
    html { width: 100%; height: 100%; }
    body { width: 100%; height: 100vh; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 18% 15%, rgba(205,90,255,.34), transparent 28%),
        radial-gradient(circle at 82% 80%, rgba(119,46,210,.38), transparent 32%),
        linear-gradient(145deg, var(--deep), var(--deep2) 55%, #351078);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .countdown-card {
      width: min(94vw, 1010px);
      min-height: min(72.6vw, 780px);
      border-radius: 30px;
      overflow: hidden;
      position: absolute;
      left: 50%;
      top: 50%;
      padding: 28px 38px 34px;
      text-align: center;
      background: linear-gradient(180deg, rgba(15,7,73,.93), rgba(48,13,111,.94));
      box-shadow: 0 24px 70px rgba(0,0,0,.42), inset 0 0 0 2px rgba(255,255,255,.18);
      transform: translate(-50%, -50%) scale(var(--fit-scale, 1));
      transform-origin: center center;
      will-change: transform;
    }
    .countdown-card::before,
    .countdown-card::after {
      content: "↑";
      position: absolute;
      font-size: 220px;
      font-weight: 900;
      color: rgba(186,72,255,.08);
      line-height: 1;
      z-index: 0;
    }
    .countdown-card::before { left: -30px; bottom: -45px; }
    .countdown-card::after { right: -22px; top: 170px; }
    .content { position: relative; z-index: 1; }
    .logo {
      display: block;
      width: 100%;
      max-height: 190px;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,.28);
    }
    .eyebrow {
      margin-top: 22px;
      font-size: clamp(20px, 3vw, 30px);
      font-weight: 800;
      letter-spacing: .09em;
      text-transform: uppercase;
    }
    .days-number {
      margin: 5px 0 0;
      font-size: clamp(112px, 25vw, 205px);
      line-height: .9;
      font-weight: 900;
      letter-spacing: -.055em;
      text-shadow: 0 8px 0 rgba(0,0,0,.20), 0 0 28px rgba(224,119,255,.36);
    }
    .days-label {
      margin: 6px 0 18px;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #f2d8ff;
    }
    .live-label {
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 800;
      opacity: .82;
      margin-bottom: 8px;
    }
    .live-clock {
      display: flex;
      justify-content: center;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
      font-size: clamp(34px, 6vw, 60px);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: 20px;
      padding: 26px 30px;
      margin: 24px auto 30px;
      max-width: 760px;
    }
    .live-clock span { white-space: nowrap; }
    .event-name {
      margin: 0;
      font-size: clamp(25px, 4.5vw, 42px);
      font-weight: 900;
      text-transform: uppercase;
    }
    .event-date {
      margin: 8px 0 0;
      font-size: clamp(20px, 3.5vw, 30px);
      font-weight: 800;
      color: #efcfff;
    }
    .details {
      margin: 11px 0 0;
      font-size: clamp(15px, 2.6vw, 21px);
      line-height: 1.45;
      font-weight: 700;
    }
    .cause {
      margin: 18px auto 0;
      max-width: 640px;
      font-size: clamp(14px, 2.2vw, 18px);
      line-height: 1.4;
      opacity: .92;
      font-weight: 900;
    }
    .update-note {
      margin-top: 13px;
      font-size: 12px;
      opacity: .70;
    }
    @page { size: landscape; }
    @media (max-width: 520px) {
      body { padding: 0; }
      .countdown-card { width: 100vw; min-height: 100vh; border-radius: 0; padding: 18px 20px 28px; }
      .logo { max-height: 135px; }
      .eyebrow { margin-top: 18px; }
    }
  </style>
</head>
<body>
  <main class="countdown-card" aria-label="LEVEL UP Walk-A-Thon live countdown">
    <div class="content">
      <img class="logo" src="banner.png" alt="LEVEL UP logo with purple upward arrows" />
      <div class="eyebrow" id="statusLine">Countdown to the Walk-A-Thon</div>

      <div class="live-clock" id="liveClock" aria-live="polite">
        <span id="exactDays">72 days</span>
        <span>•</span>
        <span id="hours">00 hours</span>
        <span>•</span>
        <span id="minutes">00 minutes</span>
        <span>•</span>
        <span id="seconds">00 seconds</span>
      </div>

      <h1 class="event-name">LEVEL UP Walk-A-Thon</h1>
      <p class="event-date">Saturday, September 26, 2026</p>
      <p class="details">Pike High School<br />Check-In: 9:00 A.M. &nbsp;|&nbsp; Walk: 10:00 A.M.</p>
      <p class="cause">Proceeds benefit family childcare providers in Marion County.</p>
      <p class="update-note">Updates automatically using Indianapolis time.</p>
    </div>
  </main>

  <script>
    (() => {
      const EVENT_DATE = { year: 2026, month: 9, day: 26 };
      const TARGET = new Date('2026-09-26T10:00:00-04:00').getTime();
      const TZ = 'America/Indiana/Indianapolis';
      const oneDay = 24 * 60 * 60 * 1000;

      function indianapolisDateParts(now) {
        const parts = new Intl.DateTimeFormat('en-US', {
          timeZone: TZ,
          year: 'numeric', month: 'numeric', day: 'numeric'
        }).formatToParts(now);
        const values = {};
        for (const part of parts) {
          if (part.type !== 'literal') values[part.type] = Number(part.value);
        }
        return values;
      }

      function pad(value) { return String(value).padStart(2, '0'); }

      function update() {
        const now = new Date();
        const p = indianapolisDateParts(now);
        const todayUTC = Date.UTC(p.year, p.month - 1, p.day);
        const eventUTC = Date.UTC(EVENT_DATE.year, EVENT_DATE.month - 1, EVENT_DATE.day);
        const calendarDiff = Math.round((eventUTC - todayUTC) / oneDay);

        const status = document.getElementById('statusLine');

        if (calendarDiff > 0) {
          status.textContent = 'Countdown to the Walk-A-Thon';
        } else if (calendarDiff === 0) {
          status.textContent = 'The LEVEL UP Walk-A-Thon';
        } else {
          status.textContent = 'The Walk-A-Thon was a success';
        }

        let remaining = Math.max(0, TARGET - now.getTime());
        const d = Math.floor(remaining / oneDay); remaining %= oneDay;
        const h = Math.floor(remaining / 3600000); remaining %= 3600000;
        const m = Math.floor(remaining / 60000); remaining %= 60000;
        const s = Math.floor(remaining / 1000);

        document.getElementById('exactDays').textContent = `${d} ${d === 1 ? 'day' : 'days'}`;
        document.getElementById('hours').textContent = `${pad(h)} hours`;
        document.getElementById('minutes').textContent = `${pad(m)} minutes`;
        document.getElementById('seconds').textContent = `${pad(s)} seconds`;
      }

      update();
      setInterval(update, 1000);
    })();
  </script>

  <script>
    (() => {
      const card = document.querySelector('.countdown-card');

      function fitCountdownToScreen() {
        card.style.setProperty('--fit-scale', '1');

        const bodyStyle = getComputedStyle(document.body);
        const horizontalPadding = parseFloat(bodyStyle.paddingLeft) + parseFloat(bodyStyle.paddingRight);
        const verticalPadding = parseFloat(bodyStyle.paddingTop) + parseFloat(bodyStyle.paddingBottom);
        const availableWidth = Math.max(1, window.innerWidth - horizontalPadding);
        const availableHeight = Math.max(1, window.innerHeight - verticalPadding);
        const scale = Math.min(
          1,
          availableWidth / card.offsetWidth,
          availableHeight / card.offsetHeight
        );

        card.style.setProperty('--fit-scale', Math.max(0.1, scale * 0.97));
      }

      window.addEventListener('resize', fitCountdownToScreen);
      window.addEventListener('orientationchange', fitCountdownToScreen);

      const logo = document.querySelector('.logo');
      if (logo && !logo.complete) logo.addEventListener('load', fitCountdownToScreen, { once: true });
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(fitCountdownToScreen);

      requestAnimationFrame(fitCountdownToScreen);
    })();
  </script>
</body>
</html>
